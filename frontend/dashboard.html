<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>FoodShare — Dashboard</title>
  <meta name="description" content="FoodShare dashboard — post food, accept requests, and track deliveries.">
  <!-- PWA + iPhone -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#22c55e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FoodShare">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
  <!-- Mobile hamburger -->
  <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">🍽️ FoodShare</div>
        <div class="logo-sub">Food Sharing Platform</div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="userChip" onclick="navigateTo('profile')">
          <div class="avatar" id="userAvatar"></div>
          <div class="user-info">
            <div class="user-name" id="userName"></div>
            <div class="user-role" id="userRoleLabel"></div>
          </div>
        </div>
        <button class="btn btn-secondary btn-sm btn-full" onclick="logout()" style="font-size:12px;letter-spacing:0.02em;">
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="mainContent">
      <div id="viewHome"></div>
      <div id="viewPosts"         class="hidden"></div>
      <div id="viewNewPost"       class="hidden"></div>
      <div id="viewDeliveries"    class="hidden"></div>
      <div id="viewNotifications" class="hidden"></div>
      <div id="viewProfile"       class="hidden"></div>
    </main>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav" id="bottomNav"></nav>

  <!-- Post Detail Modal -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Food Details</span>
        <span class="modal-close" onclick="closeModal()" role="button" aria-label="Close">✕</span>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script>
    // ═══════════════════════════════════════════════════
    // GLOBALS
    // ═══════════════════════════════════════════════════
    const API = '/api';
    let token = localStorage.getItem('fs_token');
    let user  = JSON.parse(localStorage.getItem('fs_user') || 'null');
    let currentView = 'home';
    let map, marker;
    let deliveriesCache = [];
    let deliveryProofImageData = '';
    let notificationPollTimer = null;
    let knownNotificationIds = new Set();
    let notificationBootstrapped = false;
    let volunteerCoords = null;
    let rescueRadarTimer = null;

    if (!token || !user) { window.location.href = 'index.html'; }

    // ═══════════════════════════════════════════════════
    // API HELPER
    // ═══════════════════════════════════════════════════
    function api(path, opts = {}) {
      return fetch(API + path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
          ...(opts.headers || {})
        }
      }).then(async r => {
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Request failed');
        return d;
      });
    }

    // ═══════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════
    function toast(msg, type = 'info') {
      const t = document.createElement('div');
      t.className = `toast toast-${type}`;
      t.appendChild(document.createTextNode(msg));
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 5000);
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    function timeAgo(dt) {
      if (!dt) return '';
      const diff = (Date.now() - new Date(dt)) / 1000;
      if (diff < 60) return `${~~diff}s ago`;
      if (diff < 3600) return `${~~(diff / 60)}m ago`;
      if (diff < 86400) return `${~~(diff / 3600)}h ago`;
      return `${~~(diff / 86400)}d ago`;
    }

    function fmtDate(dt) {
      if (!dt) return '—';
      return new Date(dt).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function fmtHoursLeft(hoursLeft) {
      if (hoursLeft == null || Number.isNaN(Number(hoursLeft))) return 'No expiry set';
      const totalMinutes = Math.max(0, Math.round(Number(hoursLeft) * 60));
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      if (h <= 0) return `${m}m left`;
      return `${h}h ${m}m left`;
    }

    function statusBadge(s) {
      const icons = { available: '🟢', accepted: '🟡', picked_up: '🔵', delivered: '✅', expired: '🔴', cancelled: '⚫' };
      return `<span class="badge badge-${s}">${icons[s] || ''} ${s.replace('_', ' ')}</span>`;
    }

    function categoryIcon(c) {
      const m = { meals: '🍛', snacks: '🍪', fruits: '🍎', vegetables: '🥦', dairy: '🥛', bakery: '🍞', other: '📦' };
      return m[c] || '📦';
    }

    function closeModal() {
      document.getElementById('postModal').classList.remove('open');
    }

    function stopRescueRadarRefresh() {
      if (rescueRadarTimer) {
        clearInterval(rescueRadarTimer);
        rescueRadarTimer = null;
      }
    }

    function startRescueRadarRefresh() {
      stopRescueRadarRefresh();
      renderRescueRadar();
      rescueRadarTimer = setInterval(() => {
        if (currentView === 'home' && user.role === 'volunteer') renderRescueRadar();
      }, 30000);
    }

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // Animated number counter
    function countUp(el, target, duration = 800) {
      const start = performance.now();
      const step = (now) => {
        const progress = Math.min((now - start) / duration, 1);
        el.textContent = Math.round(progress * target);
        if (progress < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }

    // Skeleton HTML
    function skeletonStats() {
      return `<div class="stats-grid">${[1,2,3,4].map(() =>
        `<div class="skeleton skeleton-stat"></div>`).join('')}</div>`;
    }
    function skeletonCards() {
      return `<div class="posts-grid">${[1,2,3,4,5,6].map(() => `
        <div class="skeleton skeleton-card"></div>`).join('')}</div>`;
    }

    // ═══════════════════════════════════════════════════
    // SIDEBAR / NAV SETUP
    // ═══════════════════════════════════════════════════
    function setupSidebar() {
      const av = document.getElementById('userAvatar');
      av.textContent = user.name[0].toUpperCase();
      av.className = `avatar avatar-${user.role}`;
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userRoleLabel').innerHTML =
        `<span class="badge-role-${user.role}">${user.role.charAt(0).toUpperCase() + user.role.slice(1)}</span>`;

      const donorNav = [
        { id: 'home',          icon: '🏠', label: 'Dashboard' },
        { id: 'newPost',       icon: '➕', label: 'Post Food' },
        { id: 'posts',         icon: '📋', label: 'My Posts' },
        { id: 'deliveries',    icon: '🚗', label: 'Deliveries' },
        { id: 'notifications', icon: '🔔', label: 'Notifications', badge: true },
        { id: 'profile',       icon: '👤', label: 'Profile' },
      ];
      const volunteerNav = [
        { id: 'home',          icon: '🏠', label: 'Dashboard' },
        { id: 'posts',         icon: '🍽️', label: 'Browse Food' },
        { id: 'deliveries',    icon: '🚗', label: 'My Deliveries' },
        { id: 'notifications', icon: '🔔', label: 'Notifications', badge: true },
        { id: 'profile',       icon: '👤', label: 'Profile' },
      ];

      const items = user.role === 'donor' ? donorNav : volunteerNav;
      const nav = document.getElementById('sidebarNav');
      nav.innerHTML = `<div class="nav-section-label">Menu</div>` +
        items.map(it => `
          <div class="nav-item ${currentView === it.id ? 'active' : ''}" id="nav-${it.id}" onclick="navigateTo('${it.id}')">
            <span class="nav-icon">${it.icon}</span>
            <span>${it.label}</span>
            ${it.badge ? `<span id="notifBadge" class="notif-badge hidden" style="margin-left:auto;">0</span>` : ''}
          </div>`).join('');

      startNotificationPolling();
    }

    function startNotificationPolling() {
      if (notificationPollTimer) clearInterval(notificationPollTimer);
      pollNotifications();
      notificationPollTimer = setInterval(pollNotifications, 10000);
    }

    function maybeSystemNotification(n) {
      if (document.visibilityState === 'visible') return;
      if (!('Notification' in window)) return;
      if (Notification.permission === 'granted') {
        new Notification(n.title, { body: n.message, icon: '/img/icon-192.png' });
      } else if (Notification.permission !== 'denied') {
        Notification.requestPermission().then((perm) => {
          if (perm === 'granted') {
            new Notification(n.title, { body: n.message, icon: '/img/icon-192.png' });
          }
        }).catch(() => {});
      }
    }

    async function pollNotifications() {
      try {
        const [countResp, notifications] = await Promise.all([
          api('/notifications/unread-count'),
          api('/notifications')
        ]);
        const count = Number(countResp?.count || 0);
        const badge = document.getElementById('notifBadge');
        if (badge) { badge.textContent = count; badge.classList.toggle('hidden', count === 0); }

        if (!Array.isArray(notifications)) return;

        if (!notificationBootstrapped) {
          notifications.forEach(n => knownNotificationIds.add(n.id));
          notificationBootstrapped = true;
          return;
        }

        const newUnread = notifications.filter(n => !n.is_read && !knownNotificationIds.has(n.id));
        notifications.forEach(n => knownNotificationIds.add(n.id));
        newUnread.slice(0, 3).forEach((n) => {
          toast(`${n.title}: ${n.message}`, 'info');
          maybeSystemNotification(n);
        });
      } catch (e) {}
    }

    function navigateTo(view) {
      currentView = view;
      if (!(view === 'home' && user.role === 'volunteer')) stopRescueRadarRefresh();
      const allViews = ['home', 'posts', 'newPost', 'deliveries', 'notifications', 'profile'];
      allViews.forEach(v => {
        document.getElementById('view' + v.charAt(0).toUpperCase() + v.slice(1))?.classList.add('hidden');
        document.getElementById(`nav-${v}`)?.classList.remove('active');
      });

      const camel = 'view' + view.charAt(0).toUpperCase() + view.slice(1);
      const el = document.getElementById(camel);
      if (el) {
        el.classList.remove('hidden');
        el.classList.remove('view-enter');
        void el.offsetWidth; // force reflow
        el.classList.add('view-enter');
      }
      document.getElementById(`nav-${view}`)?.classList.add('active');

      const renders = {
        home:          renderHome,
        posts:         renderPosts,
        newPost:       renderNewPost,
        deliveries:    renderDeliveries,
        notifications: renderNotifications,
        profile:       renderProfile,
      };
      renders[view]?.();

      // Update bottom nav
      document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('bn-' + view)?.classList.add('active');
    }

    // ═══════════════════════════════════════════════════
    // HOME / DASHBOARD
    // ═══════════════════════════════════════════════════
    async function renderHome() {
      const el = document.getElementById('viewHome');
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';

      el.innerHTML = `
        <div class="page-header">
          <h1>${greeting}, ${user.name.split(' ')[0]} 👋</h1>
          <p>Here's your FoodShare activity at a glance</p>
        </div>
        ${skeletonStats()}
        <div id="recentSection">
          <div class="card">${skeletonCards().replace('posts-grid','').replace('<div class="skeleton skeleton-card"></div>'.repeat(6), [1,2,3].map(()=>'<div class="skeleton skeleton-line" style="height:56px;margin:0 0 10px;border-radius:12px;"></div>').join(''))}</div>
        </div>`;

      try {
        const [posts, deliveries] = await Promise.all([api('/posts'), api('/deliveries')]);

        let statsHtml = '';
        if (user.role === 'donor') {
          const available  = posts.filter(p => p.status === 'available').length;
          const delivered  = posts.filter(p => p.status === 'delivered').length;
          const inProgress = posts.filter(p => ['accepted', 'picked_up'].includes(p.status)).length;
          statsHtml = `
            <div class="stat-card"><div class="stat-label">Total Posted</div><div class="stat-value green" data-count="${posts.length}">0</div></div>
            <div class="stat-card"><div class="stat-label">Available</div><div class="stat-value amber" data-count="${available}">0</div></div>
            <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value blue" data-count="${inProgress}">0</div></div>
            <div class="stat-card"><div class="stat-label">Delivered ✅</div><div class="stat-value green" data-count="${delivered}">0</div></div>`;
        } else {
          const active = deliveries.filter(d => ['accepted', 'picked_up'].includes(d.status)).length;
          const done   = deliveries.filter(d => d.status === 'delivered').length;
          statsHtml = `
            <div class="stat-card"><div class="stat-label">Total Deliveries</div><div class="stat-value green" data-count="${deliveries.length}">0</div></div>
            <div class="stat-card"><div class="stat-label">Active 🚴</div><div class="stat-value amber" data-count="${active}">0</div></div>
            <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value blue" data-count="${done}">0</div></div>
            <div class="stat-card"><div class="stat-label">Food Available 🍽️</div><div class="stat-value green" data-count="${posts.length}">0</div></div>`;
        }

        el.querySelector('.stats-grid').outerHTML; // just ensure removed
        el.innerHTML = `
          <div class="page-header">
            <h1>${greeting}, ${user.name.split(' ')[0]} 👋</h1>
            <p>Here's your FoodShare activity at a glance</p>
          </div>
          <div class="stats-grid">${statsHtml}</div>
          <div id="recentSection"></div>`;

        // Animate counters
        el.querySelectorAll('[data-count]').forEach(el => countUp(el, +el.dataset.count));

        // Recent
        const recent = user.role === 'donor' ? posts.slice(0,4) : deliveries.slice(0,4);
        const recentTitle = user.role === 'donor' ? 'Recent Posts' : 'Recent Deliveries';

        document.getElementById('recentSection').innerHTML = `
          <div class="card">
            <div class="card-header">
              <span class="card-title">${recentTitle}</span>
              <button class="btn btn-secondary btn-sm" onclick="navigateTo('${user.role === 'donor' ? 'posts' : 'deliveries'}')">View All →</button>
            </div>
            ${recent.length === 0
              ? `<div class="empty-state" style="padding:32px 20px;"><span class="empty-icon">📭</span><h3>No activity yet</h3><p>${user.role === 'donor' ? 'Post food to get started' : 'Browse and accept food posts'}</p></div>`
              : (user.role === 'donor'
                ? recent.map(p => `
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;" onclick="openPostModal(${p.id})">
                    <div>
                      <div style="font-weight:700;font-size:15px;">${categoryIcon(p.category)} ${p.food_name}</div>
                      <div style="font-size:12px;color:var(--text-muted);margin-top:3px;">${p.quantity} · ${timeAgo(p.created_at)}</div>
                    </div>
                    ${statusBadge(p.status)}
                  </div>`).join('')
                : recent.map(d => `
                  <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);">
                    <div>
                      <div style="font-weight:700;font-size:15px;">${categoryIcon(d.category)} ${d.food_name}</div>
                      <div style="font-size:12px;color:var(--text-muted);margin-top:3px;">by ${d.donor_name} · ${timeAgo(d.accepted_at)}</div>
                    </div>
                    ${statusBadge(d.status)}
                  </div>`).join(''))}
          </div>`;

        // Quick action card for donor
        if (user.role === 'donor') {
          document.getElementById('recentSection').insertAdjacentHTML('beforeend', `
            <div class="card mt-4" style="background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(251,191,36,0.06));border-color:rgba(34,197,94,0.2);">
              <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
                <div>
                  <div style="font-size:17px;font-weight:800;margin-bottom:4px;">Ready to share food? 🍛</div>
                  <div style="font-size:13px;color:var(--text-secondary);">Post surplus food for volunteers to pick up</div>
                </div>
                <button class="btn btn-primary" onclick="navigateTo('newPost')">+ Post Food</button>
              </div>
            </div>
            <div class="card mt-4" style="background:rgba(59,130,246,0.06);border-color:rgba(59,130,246,0.2);">
              <div class="card-header">
                <span class="card-title">🏠 Nearby Needful Contacts</span>
              </div>
              <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;">
                Allow location to find nearby NGOs, orphanages and homeless support centers for direct handover.
              </div>
              <button class="btn btn-amber" onclick="loadDonorHomeContactsByLocation()" id="homeContactsBtn">Use My Location</button>
              <div id="homeSupportContacts" style="margin-top:14px;"></div>
            </div>`);
          loadDonorHomeContactsByLocation();
        } else {
          document.getElementById('recentSection').insertAdjacentHTML('beforeend', `
            <div class="card mt-4" style="background:linear-gradient(135deg,rgba(251,191,36,0.1),rgba(34,197,94,0.05));border-color:rgba(251,191,36,0.2);">
              <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
                <div>
                  <div style="font-size:17px;font-weight:800;margin-bottom:4px;">Food waiting to be delivered 🚴</div>
                  <div style="font-size:13px;color:var(--text-secondary);">${posts.length} food listing${posts.length !== 1 ? 's' : ''} available right now</div>
                </div>
                <button class="btn btn-amber" onclick="navigateTo('posts')">Browse Food</button>
              </div>
            </div>
            <div class="card mt-4" style="border-color:rgba(239,68,68,0.35);background:linear-gradient(135deg,rgba(239,68,68,0.08),rgba(251,191,36,0.08));">
              <div class="card-header">
                <span class="card-title">🔥 Rescue Radar</span>
                <span style="font-size:11px;color:var(--text-muted);">Live urgent missions</span>
              </div>
              <div id="rescueRadarList">
                <div style="text-align:center;padding:20px;color:var(--text-muted);"><span class="spinner" style="width:22px;height:22px;"></span></div>
              </div>
            </div>`);
          startRescueRadarRefresh();
        }

      } catch (e) { toast(e.message, 'error'); }
    }

    async function renderRescueRadar() {
      if (user.role !== 'volunteer') return;
      const box = document.getElementById('rescueRadarList');
      if (!box) return;

      try {
        const coords = await getVolunteerCoordinates();
        const radiusKm = 20;
        let posts;
        if (coords) {
          const q = new URLSearchParams({
            lat: String(coords.lat),
            lng: String(coords.lng),
            radius: String(radiusKm)
          });
          posts = await api(`/posts?${q.toString()}`);
        } else {
          posts = await api('/posts');
        }

        const deliveries = await api('/deliveries');
        const weekStart = Date.now() - (7 * 24 * 60 * 60 * 1000);
        const rescueStreak = deliveries.filter(d => d.status === 'delivered' && d.delivered_at && new Date(d.delivered_at).getTime() >= weekStart).length;

        const rank = { critical: 4, high: 3, medium: 2, low: 1, expired: 0 };
        const missions = posts
          .filter(p => p.status === 'available')
          .map((p) => {
            const distanceKm = (coords && p.latitude && p.longitude)
              ? kmDistance(coords.lat, coords.lng, Number(p.latitude), Number(p.longitude))
              : null;
            const priority = rank[p.priority_level] || 0;
            const urgencyBonus = p.priority_hours_left != null ? Math.max(0, 6 - Number(p.priority_hours_left)) : 0;
            const distancePenalty = distanceKm == null ? 0 : Math.min(distanceKm / 2, 10);
            const score = (priority * 100) + (urgencyBonus * 10) - distancePenalty;
            const etaMin = distanceKm == null ? null : Math.max(5, Math.round((distanceKm / 22) * 60));
            return { ...p, distanceKm, score, etaMin };
          })
          .filter(p => ['critical', 'high'].includes(p.priority_level))
          .sort((a, b) => b.score - a.score)
          .slice(0, 3);

        if (!missions.length) {
          box.innerHTML = `
            <div style="font-size:13px;color:var(--text-muted);">
              No urgent rescue missions right now.
            </div>
            <div style="margin-top:10px;font-size:12px;color:var(--text-secondary);">
              Your 7-day rescue streak: <strong>${rescueStreak}</strong> deliveries
            </div>
          `;
          return;
        }

        box.innerHTML = `
          <div style="margin-bottom:10px;font-size:12px;color:var(--text-secondary);">
            Your 7-day rescue streak: <strong>${rescueStreak}</strong> deliveries
          </div>
          ${missions.map((m) => `
            <div style="padding:12px;border:1px solid rgba(239,68,68,0.25);border-radius:12px;margin-bottom:10px;background:rgba(255,255,255,0.45);">
              <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
                <div>
                  <div style="font-size:15px;font-weight:800;">${categoryIcon(m.category)} ${m.food_name}</div>
                  <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${m.pickup_address}</div>
                </div>
                <span class="badge badge-${m.priority_level || 'available'}">${(m.priority_level || 'urgent').toUpperCase()}</span>
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                <span class="meta-tag amber">⏳ ${fmtHoursLeft(m.priority_hours_left)}</span>
                ${m.distanceKm == null ? '' : `<span class="meta-tag">📍 ${m.distanceKm.toFixed(1)} km</span>`}
                ${m.etaMin == null ? '' : `<span class="meta-tag green">🚴 ETA ~${m.etaMin} min</span>`}
              </div>

            <option value="10" selected>Within 10 km</option>
            <option value="20">Within 20 km</option>
            <option value="50">Within 50 km</option>

          <button class="btn btn-secondary btn-sm" onclick="loadPosts()">Refresh Nearby</button>` : ''}
          ${user.role === 'donor' ? `
          <select class="form-control" id="statusFilter" onchange="filterPosts()" style="width:auto;">
            <option value="">All Status</option>
            <option value="available">Available</option>
            <option value="accepted">Accepted</option>
            <option value="picked_up">Picked Up</option>
            <option value="delivered">Delivered</option>
          </select>` : ''}
        </div>
        <div id="postsGrid">${skeletonCards()}</div>`;

    let allPosts = [];
    function getVolunteerCoordinates() {
      return new Promise((resolve) => {
        if (volunteerCoords) return resolve(volunteerCoords);
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition((pos) => {
          volunteerCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          resolve(volunteerCoords);
        }, () => resolve(null), { enableHighAccuracy: true, timeout: 8000 });
      });
    }

    async function loadPosts() {
      try {
        if (user.role === 'volunteer') {
          const radius = Number(document.getElementById('radiusFilter')?.value || 10);
          const coords = await getVolunteerCoordinates();
          if (coords) {
            const q = new URLSearchParams({
              lat: String(coords.lat),
              lng: String(coords.lng),
              radius: String(radius)
            });
            allPosts = await api(`/posts?${q.toString()}`);
          } else {
            allPosts = await api('/posts');
            toast('Location unavailable, showing all available food', 'info');
          }
        } else {
          allPosts = await api('/posts');
        }
        filterPosts();
      } catch (e) { toast(e.message, 'error'); }
    }

    function filterPosts() {
      const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
      const cat    =  document.getElementById('catFilter')?.value    || '';
      const status =  document.getElementById('statusFilter')?.value || '';
      let filtered = allPosts.filter(p => {
        if (search && !p.food_name.toLowerCase().includes(search) && !p.pickup_address.toLowerCase().includes(search)) return false;
        if (cat    && p.category !== cat)    return false;
        if (status && p.status   !== status) return false;
        return true;
      });
      renderPostsGrid(filtered);
    }

    function renderPostsGrid(posts) {
      const el = document.getElementById('postsGrid');
      if (!posts.length) {
        el.innerHTML = `<div class="empty-state">
          <span class="empty-icon">🍽️</span>
          <h3>No food found</h3>
          <p>Try adjusting filters or check back later</p>
          ${user.role === 'donor' ? `<button class="btn btn-primary mt-4" onclick="navigateTo('newPost')">+ Post Food</button>` : ''}
        </div>`;
        return;
      }
      el.innerHTML = `<div class="posts-grid">${posts.map(p => `
        <div class="food-card" onclick="openPostModal(${p.id})">
          <div class="food-card-banner ${p.category}"></div>
          <div class="food-card-body">
            <div class="food-card-name">${categoryIcon(p.category)} ${p.food_name}</div>
            <div class="food-card-desc">${p.description || 'No description provided'}</div>
            <div class="food-card-meta">
              <span class="meta-tag green">📦 ${p.quantity}</span>
              <span class="meta-tag">📍 ${p.pickup_address.split(',')[0]}</span>
              ${p.expiry_time ? `<span class="meta-tag amber">⏰ ${fmtDate(p.expiry_time)}</span>` : ''}
            </div>
            <div class="food-card-footer">
              <span class="food-card-donor">by ${p.donor_name || user.name}</span>
              ${statusBadge(p.status)}
            </div>
          </div>
        </div>`).join('')}</div>`;
    }

    let geocodeTimer;
    function geocodeAddress() {
      clearTimeout(geocodeTimer);

        const addr = document.getElementById('np_addr').value;

        try {
          const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr)}&limit=1`);
          const data = await r.json();
          if (data[0]) {
            const lat = parseFloat(data[0].lat), lng = parseFloat(data[0].lon);
            map.setView([lat, lng], 15);
            document.getElementById('np_lat').value = lat;
            document.getElementById('np_lng').value = lng;
            document.getElementById('mapCoords').innerHTML = `📌 <span style="color:var(--green-400);font-weight:600;">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>`;
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);
          }
        } catch (e) {}
      }, 900);
    }

              { label: 'Delivered', done: d.status === 'delivered',                      time: d.delivered_at  }

              <div class="tracker-step ${s.done ? 'done' : ''} ${!s.done && (i === 0 || arr[i-1].done) ? 'current' : ''}">

            ${user.role === 'volunteer' ? `Donor: <strong>${d.donor_name}</strong>` : `Volunteer: <strong>${d.volunteer_name || '—'}</strong>`}
            ${d.donor_phone && user.role === 'volunteer' ? ` · 📞 ${d.donor_phone}` : ''}
          </div>
        </div>`;

    async function advanceDelivery(id) {

      try {
        await api(`/deliveries/${id}/status`, { method: 'PATCH', body: JSON.stringify({}) });

        renderDeliveries();
      } catch (e) { toast(e.message, 'error'); }

      deliveryProofImageData = '';
      document.getElementById('postModal').classList.add('open');
      document.getElementById('modalTitle').textContent = `✅ Confirm Delivery: ${d.food_name}`;

    function handleProofImageChange(event) {
      const file = event.target.files?.[0];
      if (!file) {

      const reader = new FileReader();
      reader.onload = () => {

        const img = document.getElementById('proofImagePreview');
        if (img) img.src = deliveryProofImageData;

    function kmDistance(lat1, lon1, lat2, lon2) {
      const toRad = (d) => d * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function normalizeTel(phone = '') {
      const cleaned = String(phone).replace(/[^\d+]/g, '');
      return cleaned.startsWith('+') ? cleaned : cleaned.replace(/\+/g, '');
    }

          <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">Phone: ${r.phone ? escapeHtml(r.phone) : 'Not listed'}</div>
          <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">~ ${Number(r.distance_km || 0).toFixed(1)} km away</div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;">
            ${r.phone ? `<a href="tel:${normalizeTel(r.phone)}" style="font-size:12px;">Call</a>` : ''}
            ${Number.isFinite(r.latitude) && Number.isFinite(r.longitude) ? `<a target="_blank" rel="noopener noreferrer" href="https://www.google.com/maps/dir/?api=1&destination=${r.latitude},${r.longitude}" style="font-size:12px;">Open directions</a>` : ''}
          </div>
        </div>
      `).join('');

    async function loadDonorHomeContactsByLocation() {
      const btn = document.getElementById('homeContactsBtn');
      const list = document.getElementById('homeSupportContacts');
      if (!btn || !list) return;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Getting location…';

      const loadByAddressFallback = async (reasonText) => {
        if (!user.address || user.address.trim().length < 3) {
          list.innerHTML = `<div style="font-size:13px;color:var(--text-muted);">${reasonText} Add donor address in profile to load contacts.</div>`;
          btn.disabled = false;
          btn.innerHTML = 'Use My Location';
          return;
        }
        btn.innerHTML = '<span class="spinner"></span> Loading by address…';
        const result = await api(`/support-centers/nearby?address=${encodeURIComponent(user.address)}`);
        const centers = Array.isArray(result?.centers) ? result.centers : [];
        list.innerHTML = `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Location blocked, showing contacts near profile address.</div>`;
        if (centers.length) {
          const wrap = document.createElement('div');
          renderSupportCentersList(wrap, centers);
          list.appendChild(wrap);
        } else {
          list.insertAdjacentHTML('beforeend', `<div style="font-size:13px;color:var(--text-muted);">No nearby contacts found for profile address.</div>`);
        }
        btn.disabled = false;
        btn.innerHTML = 'Refresh by Address';
      };

      if (!window.isSecureContext) {
        await loadByAddressFallback('Location access requires HTTPS on iPhone.');
        return;
      }

      if (!navigator.geolocation) {
        await loadByAddressFallback('Geolocation is not supported on this device.');
        return;
      }

      try {
        await new Promise((resolve, reject) => {
          navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
              btn.innerHTML = '<span class="spinner"></span> Loading contacts…';
              const lat = pos.coords.latitude;
              const lng = pos.coords.longitude;
              const result = await api(`/support-centers/nearby?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}`);
              const centers = Array.isArray(result?.centers) ? result.centers : [];
              renderSupportCentersList(list, centers);
              btn.disabled = false;
              btn.innerHTML = 'Refresh by Location';
              resolve();
            } catch (e) {
              reject(e);
            }
          }, async () => {
            try {
              await loadByAddressFallback('Location permission denied.');
              resolve();
            } catch (e) {
              reject(e);
            }
          }, { enableHighAccuracy: true, timeout: 10000 });
        });
      } catch (e) {
        try {
          await loadByAddressFallback('Unable to access live location.');
        } catch (fallbackErr) {
          list.innerHTML = `<div style="font-size:13px;color:var(--text-muted);">Could not fetch nearby contacts right now.</div>`;
          btn.disabled = false;
          btn.innerHTML = 'Use My Location';
        }
      }
    }

    async function loadSupportContactsByAddress() {

      const list = document.getElementById('supportPlacesList');
      if (!btn || !list) return;
      btn.disabled = true;

      try {
        if (!user.address || user.address.trim().length < 3) {
          list.innerHTML = `<div style="font-size:13px;color:var(--text-muted);">Add your address in profile to fetch nearby NGO/shelter contacts.</div>`;
          return;
        }

        const result = await api(`/support-centers/nearby?address=${encodeURIComponent(user.address)}`);
        const top = Array.isArray(result?.centers) ? result.centers : [];
        renderSupportCentersList(list, top);
      } catch (e) {
        list.innerHTML = `<div style="font-size:13px;color:var(--text-muted);">Could not fetch NGO/shelter contacts right now.</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Refresh Contacts';
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }

    // Close sidebar on mobile nav tap
    document.getElementById('sidebarNav').addEventListener('click', () => {
      if (window.innerWidth <= 768) closeSidebar();
    });

    // Build bottom nav
    function buildBottomNav() {
      const donorItems = [
        { id: 'home',          icon: '🏠',  label: 'Home' },
        { id: 'newPost',       icon: '➕',  label: 'Post' },
        { id: 'posts',         icon: '📋',  label: 'Posts' },
        { id: 'deliveries',    icon: '🚗',  label: 'Deliver' },
        { id: 'notifications', icon: '🔔',  label: 'Alerts' },
      ];
      const volunteerItems = [
        { id: 'home',          icon: '🏠',  label: 'Home' },
        { id: 'posts',         icon: '🍽️', label: 'Browse' },
        { id: 'deliveries',    icon: '🚗',  label: 'Deliver' },
        { id: 'notifications', icon: '🔔',  label: 'Alerts' },
        { id: 'profile',       icon: '👤',  label: 'Profile' },
      ];
      const items = user.role === 'donor' ? donorItems : volunteerItems;
      const nav   = document.getElementById('bottomNav');
      nav.innerHTML = items.map(it => `
        <button class="bottom-nav-item ${currentView === it.id ? 'active' : ''}" id="bn-${it.id}" onclick="navigateTo('${it.id}')">
          <span class="bn-icon">${it.icon}</span>
          <span class="bn-label">${it.label}</span>
        </button>`).join('');
    }

    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
